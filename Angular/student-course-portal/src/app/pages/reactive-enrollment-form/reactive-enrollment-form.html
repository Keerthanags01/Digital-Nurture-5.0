<h2>Reactive Enrollment Form</h2>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

  <p>
    <label>Student Name</label><br>

    <input
      type="text"
      formControlName="studentName">

    <br>

    <span *ngIf="enrollForm.get('studentName')?.touched &&
                 enrollForm.get('studentName')?.errors?.['required']">
      Name is required
    </span>

    <span *ngIf="enrollForm.get('studentName')?.touched &&
                 enrollForm.get('studentName')?.errors?.['minlength']">
      Minimum 3 characters
    </span>

  </p>

  <p>

    <label>Email</label><br>

    <input
      type="email"
      formControlName="studentEmail">

    <br>

    <span *ngIf="enrollForm.get('studentEmail')?.pending">
      Checking email...
    </span>

    <span *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
      Email already exists.
    </span>

  </p>

  <p>

    <label>Course Code</label><br>

    <input
      type="text"
      formControlName="courseId"
      placeholder="Example: XX101">

    <br>

    <span *ngIf="enrollForm.get('courseId')?.errors?.['required']">
      Course Code is required.
    </span>

    <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
      Course code starting with XX is not allowed.
    </span>

  </p>

  <p>

    <label>Preferred Semester</label><br>

    <select formControlName="preferredSemester">
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>

  </p>

  <p>

    <label>

      <input
        type="checkbox"
        formControlName="agreeToTerms">

      I Agree to Terms

    </label>

  </p>

  <hr>

  <h3>Additional Courses</h3>

  <button
    type="button"
    (click)="addCourse()">
    Add Another Course
  </button>

  <br><br>

  <div *ngFor="let ctrl of additionalCourses.controls; let i = index">

    <input
      type="text"
      [formControl]="ctrl"
      placeholder="Course Code">

    <button
      type="button"
      (click)="removeCourse(i)">
      Remove
    </button>

    <br><br>

  </div>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

</form>

<hr>

<h3>Live Form Value</h3>

<pre>{{ enrollForm.value | json }}</pre>
