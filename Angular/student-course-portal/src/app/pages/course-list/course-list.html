<h2>Available Courses</h2>

<hr>

<label>Search Course:</label>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Enter course name">

<button
  type="button"
  (click)="searchCourse()">
  Search
</button>

<p>
  Search Value:
  <strong>{{ searchTerm }}</strong>
</p>

<hr>

<div *ngFor="let course of courses">

  <div
    (click)="openCourse(course)"
    style="cursor:pointer; margin-bottom:20px;">

    <app-course-card
      [course]="course">
    </app-course-card>

  </div>

</div>
