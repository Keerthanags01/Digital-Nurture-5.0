<h1>{{ portalName }}</h1>

<p>
  Welcome to the Student Course Portal.
</p>

<hr>

<h3>Portal Statistics</h3>

<ul>
  <li>Courses Available: {{ totalCourses }}</li>
  <li>Enrolled: {{ totalStudents }}</li>
  <li>GPA: {{ averageCGPA }}</li>
</ul>

<hr>

<!-- Property Binding -->
<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">

  Enroll Now

</button>

<p>{{ message }}</p>

<hr>

<label>Search Course:</label>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Enter course name">

<p>
  Searching for:
  <strong>{{ searchTerm }}</strong>
</p>
<hr>

<app-course-summary-widget></app-course-summary-widget>
<hr>

<app-notification></app-notification>
