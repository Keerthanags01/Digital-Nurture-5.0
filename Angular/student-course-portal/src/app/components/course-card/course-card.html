<div class="course-card" appHighlight>

  <h3>{{ course.name }}</h3>

  <p><strong>Course Code:</strong> {{ course.code }}</p>

  <p>
    <strong>Credits:</strong>
    {{ course.credits | creditLabel }}
  </p>

  <p>

    <span [ngSwitch]="course.gradeStatus">

      <span *ngSwitchCase="'passed'">✅ Passed</span>

      <span *ngSwitchCase="'failed'">❌ Failed</span>

      <span *ngSwitchCase="'pending'">⏳ Pending</span>

    </span>

  </p>

  <button
    (click)="toggleEnrollment()">

    {{
      enrollmentService.isEnrolled(course.id)
      ? 'Unenroll'
      : 'Enroll'
    }}

  </button>

</div>

<hr>
